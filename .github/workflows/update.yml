name: Update Bet Tracker

on:
  # Disparado manualmente no GitHub (Actions > Update Bet Tracker > Run workflow)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
        run: python tracker.py

      - name: Commit and push if changed
        run: |
          git config user.name  "henriquelbk"
          git config user.email "henriquelbk@users.noreply.github.com"
          git add data/bets.json REPORT.md
          git diff --cached --quiet || git commit -m "chore: update bets [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
